      // 一次性清除旧 SW 缓存（v2 标记防止重复刷新）
      (function(){
        var V = 'cs_cache_v2';
        if (localStorage.getItem(V)) return;
        if (!('serviceWorker' in navigator)) return;
        Promise.all([
          caches.keys().then(function(n){ n.forEach(function(k){ caches.delete(k); }); }),
          navigator.serviceWorker.getRegistrations().then(function(r){ r.forEach(function(s){ s.unregister(); }); return r.length; })

          localStorage.setItem(V, '1');
          if (res[1] > 0) location.reload();
        });
      })();
